###############################################################################
# composite action: terraform/apply
#
# Self-contained Terraform workflow: init (with remote S3 state backend) →
# plan → apply.  Designed for trusted deployment jobs; never used on PRs.
# The environment name is normalised ("production" → "prod") before loading
# the matching envs/<env>.tfvars file.
#
# Callers:  staging.yml (terraform-staging),  release.yml (terraform-production)
# Inputs:   working-directory, terraform-version, environment, aws-region,
#           state-bucket, state-lock-table
###############################################################################
name: "Terraform Apply"
description: "Init + plan + apply Terraform changes for a given environment"

inputs:
  working-directory:
    description: "Terraform working directory"
    required: false
    default: "./mypythonproject1-infra"
  terraform-version:
    description: "Terraform version to install"
    required: false
    default: "1.5.0"
  environment:
    description: "Target environment (staging | prod | production)"
    required: true
  aws-region:
    description: "AWS region"
    required: false
    default: "us-east-1"
  state-bucket:
    description: "S3 bucket for Terraform state"
    required: true
  state-lock-table:
    description: "(Deprecated) DynamoDB table for state locking"
    required: false
    default: ""

outputs:
  apply-summary:
    description: "Key Terraform outputs after apply"
    value: ${{ steps.export.outputs.summary }}

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Terraform init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Normalise: 'production' -> 'prod' for tfvars file lookup
        ENV="${{ inputs.environment }}"
        [[ "$ENV" == "production" ]] && ENV="prod"
        echo "TF_ENV=$ENV" >> "$GITHUB_ENV"

        terraform init \
          -backend-config="bucket=${{ inputs.state-bucket }}" \
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
          -backend-config="region=${{ inputs.aws-region }}" \
          -backend-config="use_lockfile=true" \
          -upgrade
        echo "Terraform init complete"

    - name: Terraform plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TF_VAR_environment: ${{ inputs.environment }}
        TF_VAR_aws_region: ${{ inputs.aws-region }}
      run: |
        PLAN_FILE="/tmp/tfplan.${{ inputs.environment }}"
        terraform plan \
          -var-file="envs/${TF_ENV}.tfvars" \
          -out="$PLAN_FILE" \
          -input=false \
          -no-color
        echo "plan-file=$PLAN_FILE" >> "$GITHUB_OUTPUT"
        echo "Terraform plan complete"

    - name: Terraform apply
      id: apply
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        terraform apply -auto-approve "${{ steps.plan.outputs.plan-file }}"
        echo "Terraform apply complete"

    - name: Export outputs
      id: export
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        OUTPUT_FILE="/tmp/tf-outputs-${{ inputs.environment }}.json"
        terraform output -json > "$OUTPUT_FILE"
        echo "Outputs saved to: $OUTPUT_FILE"

        {
          echo 'summary<<EOF'
          terraform output -json | jq -r 'to_entries | .[] | "\(.key): \(.value.value)"' 2>/dev/null || echo "(no outputs)"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
