name: "Terraform Validate"
description: "Comprehensive Terraform validation with format check, linting, and security scanning"
inputs:
  terraform_version:
    description: "Terraform version to use"
    required: false
    default: "1.5.0"
  working_directory:
    description: "Working directory for Terraform"
    required: false
    default: "./infra"
  check_format:
    description: "Check Terraform format"
    required: false
    default: "true"
  run_tflint:
    description: "Run tflint security checks"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Check Terraform format
      if: inputs.check_format == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "Checking Terraform format..."
        terraform fmt -check -recursive

    - name: Terraform init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform init -backend=false

    - name: Terraform validate
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform validate

    - name: Setup tflint
      if: inputs.run_tflint == 'true'
      uses: terraform-linters/setup-tflint@v3
      with:
        tflint_version: v0.48.0

    - name: Initialize tflint
      if: inputs.run_tflint == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: tflint --init

    - name: Run tflint
      if: inputs.run_tflint == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        echo "Running tflint security checks..."
        tflint --format compact
