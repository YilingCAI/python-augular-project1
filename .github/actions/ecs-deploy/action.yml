name: "ECS Deploy"
description: "Deploy updated task definition to ECS Fargate service"
inputs:
  cluster:
    description: "ECS cluster name"
    required: true
  service:
    description: "ECS service name"
    required: true
  task_definition:
    description: "Path to task definition file"
    required: true
  container_name:
    description: "Container name in task definition"
    required: true
  image:
    description: "Docker image to deploy"
    required: true
  wait_for_stability:
    description: "Wait for service to stabilize"
    required: false
    default: "true"
  timeout_seconds:
    description: "Timeout for service stabilization"
    required: false
    default: "600"

outputs:
  task_definition_arn:
    description: "ARN of the new task definition"
    value: ${{ steps.deploy.outputs.task_definition_arn }}

runs:
  using: "composite"
  steps:
    - name: Update task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ inputs.task_definition }}
        container-name: ${{ inputs.container_name }}
        image: ${{ inputs.image }}

    - name: Deploy to ECS service
      id: deploy
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ inputs.service }}
        cluster: ${{ inputs.cluster }}
        wait-for-service-stability: ${{ inputs.wait_for_stability }}
        wait-for-service-stability-timeout: ${{ inputs.timeout_seconds }}

    - name: Verify deployment
      if: inputs.wait_for_stability == 'true'
      shell: bash
      run: |
        echo "Service deployed successfully"
        echo "Task Definition: ${{ steps.deploy.outputs.task_definition_arn }}"
