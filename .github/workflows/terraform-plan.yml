name: Terraform Plan

on:
    pull_request:
        paths:
            - "infra/**"
            - ".github/workflows/terraform-*.yml"
    push:
        branches:
            - main
            - staging
        paths:
            - "infra/**"

permissions:
    contents: read
    pull-requests: write
    id-token: write

env:
    AWS_REGION: us-east-1
    TF_VERSION: 1.5.0

jobs:
    terraform-plan:
        name: Terraform Plan - ${{ matrix.environment }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                environment: [dev, staging, prod]
            max-parallel: 1
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: ${{ env.TF_VERSION }}

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Create Terraform backend config
              working-directory: infra
              run: |
                  cat > backend.tf << EOF
                  terraform {
                    backend "s3" {
                      bucket         = "${{ secrets.TERRAFORM_STATE_BUCKET }}"
                      key            = "${{ matrix.environment }}/terraform.tfstate"
                      region         = "${{ env.AWS_REGION }}"
                      dynamodb_table = "${{ secrets.TERRAFORM_LOCK_TABLE }}"
                      encrypt        = true
                    }
                  }
                  EOF

            - name: Terraform fmt check
              working-directory: infra
              run: terraform fmt -check -recursive

            - name: Terraform init
              working-directory: infra
              run: |
                  terraform init \
                    -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
                    -backend-config="key=${{ matrix.environment }}/terraform.tfstate" \
                    -backend-config="region=${{ env.AWS_REGION }}" \
                    -backend-config="dynamodb_table=${{ secrets.TERRAFORM_LOCK_TABLE }}" \
                    -upgrade

            - name: Terraform validate
              working-directory: infra
              run: terraform validate

            - name: Run tflint
              uses: terraform-linters/setup-tflint@v3
              with:
                  tflint_version: v0.48.0

            - name: Initialize tflint
              run: |
                  cd infra
                  tflint --init

            - name: Run tflint checks
              working-directory: infra
              run: tflint --format compact

            - name: Terraform plan
              working-directory: infra
              env:
                  TF_VAR_environment: ${{ matrix.environment }}
                  TF_VAR_aws_region: ${{ env.AWS_REGION }}
              run: |
                  terraform plan \
                    -var-file="envs/${{ matrix.environment }}.tfvars" \
                    -out=tfplan.${{ matrix.environment }}

            - name: Upload Terraform plan
              uses: actions/upload-artifact@v3
              with:
                  name: tfplan-${{ matrix.environment }}
                  path: infra/tfplan.${{ matrix.environment }}
                  retention-days: 5

            - name: Generate plan summary
              if: github.event_name == 'pull_request'
              working-directory: infra
              run: |
                  terraform show -no-color tfplan.${{ matrix.environment }} > plan-summary.txt

            - name: Comment PR with plan
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v6
              with:
                  script: |
                      const fs = require('fs');
                      const planSummary = fs.readFileSync('infra/plan-summary.txt', 'utf8');
                      const maxChars = 65000;
                      const output = planSummary.substring(0, maxChars);

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: `## Terraform Plan - ${{ matrix.environment }}\n\`\`\`terraform\n${output}\n\`\`\``
                      });

    terraform-security-scan:
        name: Terraform Security Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run Checkov scan
              uses: bridgecrewio/checkov-action@master
              with:
                  directory: "infra"
                  framework: "terraform"
                  output_format: "sarif"
                  output_file_path: "checkov-tf-results.sarif"
                  quiet: true

            - name: Upload Checkov results
              uses: github/codeql-action/upload-sarif@v2
              with:
                  sarif_file: "checkov-tf-results.sarif"
                  category: "checkov-terraform"

    notify:
        name: Notify Plan Status
        runs-on: ubuntu-latest
        if: always()
        needs: [terraform-plan, terraform-security-scan]
        steps:
            - name: Check plan status
              run: |
                  if [[ "${{ needs.terraform-plan.result }}" == "failure" || "${{ needs.terraform-security-scan.result }}" == "failure" ]]; then
                    echo "Terraform plan failed - Review logs"
                    exit 1
                  fi
                  echo "Terraform plan completed successfully"
