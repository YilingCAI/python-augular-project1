name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["main", "develop", "staging"]
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    security-events: write
    checks: write
    pull-requests: write

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io
    AWS_REGION: us-east-1

jobs:
    security-scan:
        name: Security Scanning
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "fs"
                  scan-ref: "."
                  format: "sarif"
                  output: "trivy-results.sarif"
                  severity: "CRITICAL,HIGH"

            - name: Upload Trivy results to GitHub Security
              uses: github/codeql-action/upload-sarif@v2
              with:
                  sarif_file: "trivy-results.sarif"
                  category: "trivy"

            - name: Run Checkov for IaC scanning
              uses: bridgecrewio/checkov-action@master
              with:
                  directory: "infra"
                  framework: terraform
                  output_format: sarif
                  output_file_path: "checkov-results.sarif"
                  quiet: true
                  compact: true

            - name: Upload Checkov results
              uses: github/codeql-action/upload-sarif@v2
              with:
                  sarif_file: "checkov-results.sarif"
                  category: "checkov"

            - name: Run secret scanning with GitGuardian
              uses: gitguardian/ggshield-action@master
              env:
                  GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
              continue-on-error: true

    backend:
        name: Backend Tests
        runs-on: ubuntu-latest
        needs: security-scan
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: testdb
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"
                  cache: "pip"

            - name: Install dependencies
              working-directory: backend
              run: |
                  python -m pip install --upgrade pip
                  pip install poetry
                  poetry config virtualenvs.create false
                  poetry install

            - name: Run Ruff linter
              working-directory: backend
              run: |
                  ruff check app/ --output-format=github
                  ruff format app/ --check

            - name: Run Bandit security checks
              working-directory: backend
              run: |
                  pip install bandit
                  bandit -r app/ -f json -o bandit-report.json
              continue-on-error: true

            - name: Upload Bandit results
              if: always()
              uses: github/codeql-action/upload-sarif@v2
              with:
                  sarif_file: "backend/bandit-report.json"
                  category: "bandit"
              continue-on-error: true

            - name: Run pytest with coverage
              working-directory: backend
              env:
                  DATABASE_USER: postgres
                  DATABASE_PASSWORD: postgres
                  DATABASE_HOST: localhost
                  DATABASE_PORT: 5432
                  DATABASE_NAME: testdb
                  JWT_SECRET_KEY: test-secret-key-for-ci
                  JWT_ALGORITHM: HS256
                  JWT_EXPIRE_MINUTES: 60
                  ENVIRONMENT: test
              run: |
                  pytest tests/ -v \
                    --cov=app \
                    --cov-report=xml \
                    --cov-report=html \
                    --junitxml=test-results.xml \
                    --maxfail=5 \
                    --tb=short

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v3
              with:
                  files: ./backend/coverage.xml
                  flags: backend
                  name: backend-coverage
                  fail_ci_if_error: false

            - name: Publish test results
              if: always()
              uses: EnricoMi/publish-unit-test-result-action@v2
              with:
                  files: backend/test-results.xml
                  check_name: Backend Test Results

    frontend:
        name: Frontend Tests
        runs-on: ubuntu-latest
        needs: security-scan
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: frontend
              run: npm ci --prefer-offline --no-audit

            - name: Run ESLint
              working-directory: frontend
              run: npm run lint -- --format json --output-file eslint-report.json
              continue-on-error: true

            - name: Run TypeScript type-check
              working-directory: frontend
              run: npm run type-check

            - name: Run unit tests with coverage
              working-directory: frontend
              run: npm test -- --coverage --watchAll=false --passWithNoTests

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v3
              with:
                  files: ./frontend/coverage/coverage-final.json
                  flags: frontend
                  name: frontend-coverage
                  fail_ci_if_error: false

            - name: Build frontend
              working-directory: frontend
              run: npm run build

            - name: Store build artifacts
              uses: actions/upload-artifact@v3
              with:
                  name: frontend-build
                  path: frontend/dist/
                  retention-days: 1

    terraform-validate:
        name: Terraform Validation
        runs-on: ubuntu-latest
        needs: security-scan
        steps:
            - uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: 1.5.0

            - name: Terraform fmt check
              working-directory: infra
              run: terraform fmt -check -recursive

            - name: Terraform init
              working-directory: infra
              run: terraform init -backend=false

            - name: Terraform validate
              working-directory: infra
              run: terraform validate

            - name: Run tflint
              uses: terraform-linters/setup-tflint@v3
            - run: |
                  cd infra
                  tflint --init
                  tflint

    dependency-check:
        name: Dependency Analysis
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Check dependencies with Snyk (Python)
              uses: snyk/actions/python-3.12@master
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: backend --severity-threshold=high
              continue-on-error: true

            - name: Check dependencies with Snyk (Node)
              uses: snyk/actions/node@master
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  args: frontend --severity-threshold=high
              continue-on-error: true

    build-and-scan:
        name: Build Docker Images
        runs-on: ubuntu-latest
        needs: [backend, frontend, terraform-validate]
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging')
        permissions:
            contents: read
            packages: write
        outputs:
            backend-image: ${{ steps.backend-meta.outputs.tags }}
            frontend-image: ${{ steps.frontend-meta.outputs.tags }}
        strategy:
            matrix:
                include:
                    - dockerfile: backend/Dockerfile
                      context: backend
                      image: backend
                    - dockerfile: frontend/Dockerfile
                      context: frontend
                      image: frontend
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Log in to Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata - ${{ matrix.image }}
              id: meta
              uses: docker/metadata-action@v4
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix={{branch}}-
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}

            - name: Build and push Docker image - ${{ matrix.image }}
              uses: docker/build-push-action@v4
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
                      VCS_REF=${{ github.sha }}
                      VERSION=${{ github.ref_name }}

            - name: Run Trivy vulnerability scan on images
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ steps.meta.outputs.tags }}
                  format: "sarif"
                  output: "trivy-image-results.sarif"
                  severity: "CRITICAL,HIGH"

            - name: Upload Trivy image scan results
              uses: github/codeql-action/upload-sarif@v2
              with:
                  sarif_file: "trivy-image-results.sarif"
                  category: "trivy-image-${{ matrix.image }}"

    notify-status:
        name: Notify CI Status
        runs-on: ubuntu-latest
        if: always()
        needs:
            [
                security-scan,
                backend,
                frontend,
                terraform-validate,
                dependency-check,
            ]
        steps:
            - name: Check CI status
              run: |
                  if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.frontend.result }}" == "failure" || "${{ needs.terraform-validate.result }}" == "failure" ]]; then
                    echo "CI Pipeline failed - Review logs"
                    exit 1
                  fi
                  echo "CI Pipeline completed successfully"
