name: Terraform Apply

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Environment to deploy"
                required: true
                default: "staging"
                type: choice
                options:
                    - dev
                    - staging
                    - prod

permissions:
    contents: read
    id-token: write

env:
    AWS_REGION: us-east-1
    TF_VERSION: 1.5.0

jobs:
    terraform-apply:
        name: Terraform Apply - ${{ github.event.inputs.environment }}
        runs-on: ubuntu-latest
        environment:
            name: ${{ github.event.inputs.environment }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Require approval for production
              if: github.event.inputs.environment == 'prod'
              run: |
                  echo "Production deployment requires manual approval"
                  echo "Deployment triggered by: ${{ github.actor }}"

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: ${{ env.TF_VERSION }}

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Terraform init
              working-directory: infra
              run: |
                  terraform init \
                    -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
                    -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate" \
                    -backend-config="region=${{ env.AWS_REGION }}" \
                    -backend-config="dynamodb_table=${{ secrets.TERRAFORM_LOCK_TABLE }}" \
                    -upgrade

            - name: Download Terraform plan
              uses: actions/download-artifact@v3
              with:
                  name: tfplan-${{ github.event.inputs.environment }}
                  path: infra/

            - name: Terraform apply
              working-directory: infra
              env:
                  TF_VAR_environment: ${{ github.event.inputs.environment }}
                  TF_VAR_aws_region: ${{ env.AWS_REGION }}
              run: |
                  terraform apply -auto-approve tfplan.${{ github.event.inputs.environment }}

            - name: Generate apply output
              if: always()
              working-directory: infra
              run: |
                  terraform output -json > outputs.json

            - name: Upload outputs
              if: always()
              uses: actions/upload-artifact@v3
              with:
                  name: tf-outputs-${{ github.event.inputs.environment }}
                  path: infra/outputs.json
                  retention-days: 30

            - name: Export infrastructure outputs
              working-directory: infra
              run: |
                  echo "## Terraform Apply - ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### Outputs" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
                  terraform output -json | jq -r 'to_entries | .[] | "- \(.key): \(.value.value)"' >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

    update-deployment-status:
        name: Update Deployment Status
        runs-on: ubuntu-latest
        if: always()
        needs: [terraform-apply]
        steps:
            - name: Create deployment status
              uses: actions/github-script@v6
              with:
                  script: |
                      const status = '${{ needs.terraform-apply.result }}' === 'success' ? 'success' : 'failure';
                      github.rest.repos.createDeploymentStatus({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        deployment_id: context.deploymentId,
                        state: status,
                        environment_url: 'https://console.aws.amazon.com/ecs',
                        description: `Terraform apply completed with status: ${status}`
                      });

            - name: Notify on failure
              if: failure()
              uses: actions/github-script@v6
              with:
                  script: |
                      github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: '⚠️ Terraform apply failed for ${{ github.event.inputs.environment }}. Check the workflow logs for details.'
                      });
