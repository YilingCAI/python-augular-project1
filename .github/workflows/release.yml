###############################################################################
# CD — Release & Production Deployment
###############################################################################
# Two distinct flows gated by trigger type:
#
#  Flow 1 — Semantic Release  (workflow_run: CI succeeds on main)
#     Runs semantic-release: analyses conventional commits since last tag,
#     bumps version, writes CHANGELOG.md, creates git tag + GitHub Release.
#     Does NOT deploy — the tag creation triggers Flow 2.
#
#  Flow 2 — Production Deploy  (push tag v*)
#     a. Build production images tagged vX.Y.Z + latest → ECR
#     b. Trivy image scan (CRITICAL blocks deploy)
#     c. Terraform apply — production environment
#     d. ECS deploy — production environment
#     e. Smoke test
#
# Concurrency: production deploy is NEVER cancelled mid-flight.
# ALL secrets come from the "production" GitHub Environment.
###############################################################################
name: CD — Release & Production

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.2.3) — leave empty for latest"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ startsWith(github.ref, 'refs/tags/') && 'production-deploy' || 'semantic-release' }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  autoversion:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.event.workflow_run.head_branch || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: .github/package-lock.json

      - name: Install semantic-release
        working-directory: .github
        run: npm ci --ignore-scripts

      - name: Run semantic-release
        working-directory: .github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  build-production:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    strategy:
      matrix:
        service: [backend, frontend]
      fail-fast: true
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Resolve version tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate with AWS
        id: aws
        uses: ./.github/actions/aws-auth
        with:
          role-arn: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, push & scan (blocking on CRITICAL)
        uses: ./.github/actions/docker-build
        with:
          context: ./${{ matrix.service }}
          dockerfile: ./${{ matrix.service }}/Dockerfile
          image-name: mypythonproject1/${{ matrix.service }}
          registry: ${{ steps.ecr-login.outputs.registry }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=sha,prefix=,format=short
          build-args: |
            BUILD_ENV=production
            GIT_SHA=${{ steps.ver.outputs.sha_short }}
            VERSION=${{ steps.ver.outputs.tag }}
          platforms: linux/amd64
          scan: "true"
          scan-severity: "CRITICAL"
          scan-exit-code: "1"
          cache-scope: ${{ matrix.service }}-prod

  terraform-production:
    name: Terraform Apply (production)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-production]
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Authenticate with AWS
        uses: ./.github/actions/aws-auth
        with:
          role-arn: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set Terraform runtime vars
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ secrets.AWS_REGION }}"
          echo "TF_VAR_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/mypythonproject1/backend" >> "$GITHUB_ENV"
          echo "TF_VAR_frontend_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/mypythonproject1/frontend" >> "$GITHUB_ENV"
          echo "TF_VAR_jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Terraform apply
        uses: ./.github/actions/terraform/apply
        with:
          working-directory: ./infra
          terraform-version: ${{ secrets.TF_VERSION }}
          environment: production
          aws-region: ${{ secrets.AWS_REGION }}
          state-bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}
          state-lock-table: ${{ secrets.TERRAFORM_LOCK_TABLE }}

  deploy-production:
    name: Deploy to Production (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [terraform-production]
    environment: production
    strategy:
      matrix:
        service: [backend, frontend]
      fail-fast: false
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with AWS
        uses: ./.github/actions/aws-auth
        with:
          role-arn: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          PROJECT_NAME=$(awk -F'=' '/^project_name[[:space:]]*=/{gsub(/["[:space:]]/,"",$2); print $2; exit}' infra/envs/prod.tfvars)
          CLUSTER_NAME="${PROJECT_NAME}-cluster"
          if [[ "${{ matrix.service }}" == "backend" ]]; then
            SERVICE_NAME="${PROJECT_NAME}-service"
          else
            SERVICE_NAME="${PROJECT_NAME}-frontend-service"
          fi

          aws ecs update-service \
            --cluster "${CLUSTER_NAME}" \
            --service "${SERVICE_NAME}" \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}"

      - name: Wait for service stability
        timeout-minutes: 15
        run: |
          PROJECT_NAME=$(awk -F'=' '/^project_name[[:space:]]*=/{gsub(/["[:space:]]/,"",$2); print $2; exit}' infra/envs/prod.tfvars)
          CLUSTER_NAME="${PROJECT_NAME}-cluster"
          if [[ "${{ matrix.service }}" == "backend" ]]; then
            SERVICE_NAME="${PROJECT_NAME}-service"
          else
            SERVICE_NAME="${PROJECT_NAME}-frontend-service"
          fi

          aws ecs wait services-stable \
            --cluster "${CLUSTER_NAME}" \
            --services "${SERVICE_NAME}" \
            --region "${{ secrets.AWS_REGION }}"

  smoke-test-production:
    name: Smoke Test
    needs: [deploy-production]
    uses: ./.github/workflows/_smoke-test.yml
    with:
      environment: production
      app-url: ${{ vars.APP_URL }}
      warmup-seconds: 20
      deploy-version: ${{ github.ref_name }}
      deploy-sha: ${{ github.sha }}
    secrets: inherit
