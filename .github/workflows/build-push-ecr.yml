name: Build and Push to ECR

on:
    workflow_run:
        workflows: ["CI"]
        types:
            - completed
        branches:
            - main
            - develop
            - staging

permissions:
    contents: read
    id-token: write

env:
    AWS_REGION: us-east-1

jobs:
    build-and-push:
        name: Build and Push Docker Images to ECR
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        strategy:
            matrix:
                include:
                    - name: backend
                      dockerfile: backend/Dockerfile
                      context: backend
                    - name: frontend
                      dockerfile: frontend/Dockerfile
                      context: frontend
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_branch }}

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v1

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v4
              with:
                  images: ${{ steps.login-ecr.outputs.registry }}/${{ github.repository }}/${{ matrix.name }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix={{branch}}-
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build Docker image
              uses: docker/build-push-action@v4
              id: docker_build
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
                      VCS_REF=${{ github.sha }}
                      VERSION=${{ github.ref_name }}

            - name: Run Trivy image scan
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ steps.meta.outputs.tags }}
                  format: "sarif"
                  output: "trivy-ecr-${{ matrix.name }}-results.sarif"
                  severity: "CRITICAL,HIGH"

            - name: Upload Trivy scan results
              uses: github/codeql-action/upload-sarif@v2
              with:
                  sarif_file: trivy-ecr-${{ matrix.name }}-results.sarif
                  category: trivy-ecr-${{ matrix.name }}

            - name: Create image report
              run: |
                  echo "## ECR Image Build Report" >> $GITHUB_STEP_SUMMARY
                  echo "- **Service**: ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Image**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Digest**: ${{ steps.docker_build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Build Date**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY

    notify:
        name: Notify Build Status
        runs-on: ubuntu-latest
        if: always()
        needs: [build-and-push]
        steps:
            - name: Check build status
              run: |
                  if [[ "${{ needs.build-and-push.result }}" == "failure" ]]; then
                    echo "ECR build failed - Review logs"
                    exit 1
                  fi
                  echo "ECR build completed successfully"
