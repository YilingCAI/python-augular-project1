name: Deploy to Staging

on:
    push:
        branches:
            - develop
    workflow_dispatch:
        inputs:
            skip_terraform:
                description: "Skip Terraform apply (deploy only)"
                required: false
                type: boolean

permissions:
    contents: read
    deployments: write
    id-token: write

env:
    AWS_REGION: us-east-1

jobs:
    validate-ci:
        name: Validate CI Pipeline
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v4

            - name: Wait for CI to complete
              uses: tomchv/wait-my-workflow@v1.1.0
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  checkName: "CI / Backend Tests"
                  ref: ${{ github.ref }}
                  timeoutSeconds: 600

    terraform-plan:
        name: Plan Terraform Changes
        needs: [validate-ci]
        if: ${{ !github.event.inputs.skip_terraform }}
        uses: ./.github/workflows/terraform-plan.yml
        secrets: inherit

    terraform-apply:
        name: Apply Terraform Changes
        needs: [terraform-plan]
        if: ${{ !github.event.inputs.skip_terraform }}
        uses: ./.github/workflows/terraform-apply.yml
        with:
            environment: staging
        secrets: inherit

    deploy-fargate:
        name: Deploy to Fargate
        needs: [terraform-apply]
        if: ${{ !github.event.inputs.skip_terraform || github.event_name == 'workflow_dispatch' }}
        uses: ./.github/workflows/deploy-fargate.yml
        with:
            environment: staging
            image_tag: ${{ github.sha }}
        secrets: inherit
