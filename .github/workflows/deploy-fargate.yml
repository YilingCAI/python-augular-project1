name: Deploy to Fargate

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Environment to deploy"
                required: true
                default: "staging"
                type: choice
                options:
                    - staging
                    - prod
            image_tag:
                description: "Docker image tag to deploy (leave empty for latest)"
                required: false
                type: string
    workflow_run:
        workflows: ["Build and Push to ECR"]
        types:
            - completed
        branches:
            - main
            - develop
            - staging

permissions:
    contents: read
    deployments: write
    id-token: write

env:
    AWS_REGION: us-east-1

jobs:
    determine-environment:
        name: Determine Environment
        runs-on: ubuntu-latest
        outputs:
            environment: ${{ steps.set-env.outputs.environment }}
            image_tag: ${{ steps.set-tag.outputs.image_tag }}
        steps:
            - name: Determine target environment
              id: set-env
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
                  elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
                    echo "environment=prod" >> $GITHUB_OUTPUT
                  elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
                    echo "environment=staging" >> $GITHUB_OUTPUT
                  else
                    echo "environment=staging" >> $GITHUB_OUTPUT
                  fi

            - name: Determine image tag
              id: set-tag
              run: |
                  if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
                    echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
                  else
                    echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
                  fi

    pre-deployment-checks:
        name: Pre-Deployment Checks
        runs-on: ubuntu-latest
        environment:
            name: ${{ needs.determine-environment.outputs.environment }}
        needs: [determine-environment]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Verify ECR images exist
              run: |
                  REGISTRY=$(aws ecr describe-repositories --repository-names ${{ github.repository }}/backend --query 'repositories[0].repositoryUri' --output text | cut -d'/' -f1)

                  for service in backend frontend; do
                    IMAGE="$REGISTRY/${{ github.repository }}/$service:${{ needs.determine-environment.outputs.image_tag }}"
                    if aws ecr describe-images --repository-name ${{ github.repository }}/$service --image-ids imageTag=${{ needs.determine-environment.outputs.image_tag }} &>/dev/null; then
                      echo "✓ Image found: $IMAGE"
                    else
                      echo "✗ Image not found: $IMAGE"
                      exit 1
                    fi
                  done

            - name: Verify ECS cluster exists
              run: |
                  CLUSTER="mypythonproject1-cluster-${{ needs.determine-environment.outputs.environment }}"
                  if aws ecs describe-clusters --clusters "$CLUSTER" --query 'clusters[0].clusterName' --output text | grep -q "$CLUSTER"; then
                    echo "✓ ECS cluster found: $CLUSTER"
                  else
                    echo "✗ ECS cluster not found: $CLUSTER"
                    exit 1
                  fi

            - name: Check current health
              run: |
                  CLUSTER="mypythonproject1-cluster-${{ needs.determine-environment.outputs.environment }}"
                  aws ecs describe-clusters --clusters "$CLUSTER" --query 'clusters[0].statistics' --output table

    deploy:
        name: Deploy to ECS Fargate
        runs-on: ubuntu-latest
        environment:
            name: ${{ needs.determine-environment.outputs.environment }}
        needs: [determine-environment, pre-deployment-checks]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Get ECR registry
              id: ecr-registry
              run: |
                  REGISTRY=$(aws ecr describe-repositories --repository-names ${{ github.repository }}/backend --query 'repositories[0].repositoryUri' --output text | cut -d'/' -f1)
                  echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

            - name: Update ECS task definition - Backend
              id: task-def-backend
              uses: aws-actions/amazon-ecs-render-task-definition@v1
              with:
                  task-definition: infra/modules/ecs/task-definition-backend.json
                  container-name: backend
                  image: ${{ steps.ecr-registry.outputs.registry }}/${{ github.repository }}/backend:${{ needs.determine-environment.outputs.image_tag }}
                  environment-variables: |
                      ENVIRONMENT=${{ needs.determine-environment.outputs.environment }}
                      LOG_LEVEL=info

            - name: Update ECS task definition - Frontend
              id: task-def-frontend
              uses: aws-actions/amazon-ecs-render-task-definition@v1
              with:
                  task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
                  container-name: frontend
                  image: ${{ steps.ecr-registry.outputs.registry }}/${{ github.repository }}/frontend:${{ needs.determine-environment.outputs.image_tag }}

            - name: Deploy to ECS service - Backend
              uses: aws-actions/amazon-ecs-deploy-task-definition@v1
              with:
                  task-definition: ${{ steps.task-def-frontend.outputs.task-definition }}
                  service: backend-service-${{ needs.determine-environment.outputs.environment }}
                  cluster: mypythonproject1-cluster-${{ needs.determine-environment.outputs.environment }}
                  wait-for-service-stability: true
                  wait-for-service-stability-timeout: 600

            - name: Wait for deployment stability
              run: |
                  CLUSTER="mypythonproject1-cluster-${{ needs.determine-environment.outputs.environment }}"
                  SERVICES=("backend-service" "frontend-service")

                  for service in "${SERVICES[@]}"; do
                    SERVICE_NAME="${service}-${{ needs.determine-environment.outputs.environment }}"
                    echo "Waiting for $SERVICE_NAME to stabilize..."
                    
                    aws ecs wait services-stable \
                      --cluster "$CLUSTER" \
                      --services "$SERVICE_NAME"
                    
                    echo "✓ $SERVICE_NAME is stable"
                  done

            - name: Run smoke tests
              run: |
                  ENVIRONMENT=${{ needs.determine-environment.outputs.environment }}

                  # Get ALB DNS name from Terraform outputs
                  ALB_DNS=$(terraform -chdir=infra output -raw alb_dns_name 2>/dev/null || echo "")

                  if [[ -z "$ALB_DNS" ]]; then
                    echo "Warning: Could not retrieve ALB DNS name"
                    exit 0
                  fi

                  echo "Running smoke tests against: $ALB_DNS"

                  # Health check - Backend
                  for i in {1..5}; do
                    if curl -sf http://$ALB_DNS/api/health &>/dev/null; then
                      echo "✓ Backend health check passed"
                      break
                    fi
                    echo "Attempt $i/5 failed, retrying in 10s..."
                    sleep 10
                  done

                  # Health check - Frontend
                  if curl -sf http://$ALB_DNS/ &>/dev/null; then
                    echo "✓ Frontend health check passed"
                  else
                    echo "✗ Frontend health check failed"
                    exit 1
                  fi

    post-deployment:
        name: Post-Deployment Actions
        runs-on: ubuntu-latest
        if: success()
        needs: [determine-environment, deploy]
        steps:
            - name: Create deployment record
              uses: actions/github-script@v6
              with:
                  script: |
                      github.rest.repos.createDeployment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: context.ref,
                        environment: '${{ needs.determine-environment.outputs.environment }}',
                        auto_merge: false,
                        description: 'Deployed image tag: ${{ needs.determine-environment.outputs.image_tag }}'
                      });

            - name: Generate deployment summary
              run: |
                  echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
                  echo "- **Environment**: ${{ needs.determine-environment.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Image Tag**: ${{ needs.determine-environment.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Deployed By**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Deployment Time**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

    rollback:
        name: Rollback on Failure
        runs-on: ubuntu-latest
        if: failure()
        needs: [determine-environment, deploy]
        steps:
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Rollback to previous task definition
              run: |
                  CLUSTER="mypythonproject1-cluster-${{ needs.determine-environment.outputs.environment }}"
                  SERVICES=("backend-service" "frontend-service")

                  for service in "${SERVICES[@]}"; do
                    SERVICE_NAME="${service}-${{ needs.determine-environment.outputs.environment }}"
                    
                    # Get the previous task definition
                    CURRENT_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE_NAME" --query 'services[0].taskDefinition' --output text)
                    PREVIOUS_TD=$(aws ecs list-task-definitions --family-prefix "${SERVICE_NAME}" --sort DESCENDING --query "taskDefinitionArns[1]" --output text)
                    
                    if [[ -n "$PREVIOUS_TD" ]]; then
                      echo "Rolling back $SERVICE_NAME from $CURRENT_TD to $PREVIOUS_TD"
                      
                      aws ecs update-service \
                        --cluster "$CLUSTER" \
                        --service "$SERVICE_NAME" \
                        --task-definition "$PREVIOUS_TD" \
                        --force-new-deployment
                      
                      aws ecs wait services-stable \
                        --cluster "$CLUSTER" \
                        --services "$SERVICE_NAME"
                      
                      echo "✓ Rollback completed for $SERVICE_NAME"
                    else
                      echo "✗ No previous task definition found for $SERVICE_NAME"
                    fi
                  done

            - name: Notify rollback
              uses: actions/github-script@v6
              with:
                  script: |
                      github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: '⚠️ Deployment to ${{ needs.determine-environment.outputs.environment }} failed. Automatic rollback has been triggered. Please review the workflow logs.'
                      });
