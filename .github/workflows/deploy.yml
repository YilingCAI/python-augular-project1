name: Deploy Orchestration

on:
    workflow_call:
        inputs:
            environment:
                description: "Environment to deploy (dev, staging, prod)"
                required: true
                type: string
            image-tag:
                description: "Docker image tag to deploy"
                required: true
                type: string
            run-terraform:
                description: "Run Terraform apply"
                required: false
                type: boolean
                default: false
            require-approval:
                description: "Require manual approval"
                required: false
                type: boolean
                default: false
            terraform-only:
                description: "Run Terraform only, skip ECS deployment"
                required: false
                type: boolean
                default: false
        secrets:
            AWS_ROLE_TO_ASSUME:
                required: true
            TERRAFORM_STATE_BUCKET:
                required: true
            TERRAFORM_LOCK_TABLE:
                required: true

permissions:
    contents: read
    deployments: write
    id-token: write

env:
    AWS_REGION: us-east-1
    PROJECT_ROOT: .

jobs:
    validate:
        name: Validate Deployment
        runs-on: ubuntu-latest
        outputs:
            proceed: ${{ steps.validate.outputs.proceed }}
        steps:
            - uses: actions/checkout@v4

            - name: Validate inputs
              id: validate
              run: |
                  echo "Validating deployment inputs..."

                  if [[ ! "${{ inputs.environment }}" =~ ^(dev|staging|prod)$ ]]; then
                    echo "❌ Error: Invalid environment. Must be dev, staging, or prod"
                    exit 1
                  fi

                  if [ -z "${{ inputs.image-tag }}" ]; then
                    echo "❌ Error: image-tag is required"
                    exit 1
                  fi

                  echo "✅ Validation passed"
                  echo "proceed=true" >> $GITHUB_OUTPUT

    approval:
        name: Approval Gate - ${{ inputs.environment }}
        runs-on: ubuntu-latest
        if: inputs.require-approval
        environment:
            name: ${{ inputs.environment }}-approval
        needs: [validate]
        steps:
            - name: Waiting for approval
              run: echo "✅ Deployment approved by ${{ github.actor }}"

    terraform-plan:
        name: Terraform Plan - ${{ inputs.environment }}
        runs-on: ubuntu-latest
        if: inputs.run-terraform && needs.validate.outputs.proceed == 'true'
        needs: [validate, approval]
        environment:
            name: ${{ inputs.environment }}
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: 1.5.0

            - name: Terraform Plan
              env:
                  ENV: ${{ inputs.environment }}
                  TERRAFORM_STATE_BUCKET: ${{ secrets.TERRAFORM_STATE_BUCKET }}
                  TERRAFORM_LOCK_TABLE: ${{ secrets.TERRAFORM_LOCK_TABLE }}
              run: |
                  make tf-plan

            - name: Upload plan artifact
              uses: actions/upload-artifact@v3
              with:
                  name: tfplan-${{ inputs.environment }}
                  path: /tmp/tf-plans/tfplan.${{ inputs.environment }}
                  retention-days: 1

    terraform-apply:
        name: Terraform Apply - ${{ inputs.environment }}
        runs-on: ubuntu-latest
        if: inputs.run-terraform && needs.validate.outputs.proceed == 'true'
        needs: [validate, approval, terraform-plan]
        environment:
            name: ${{ inputs.environment }}
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v2
              with:
                  terraform_version: 1.5.0

            - name: Download plan artifact
              uses: actions/download-artifact@v3
              with:
                  name: tfplan-${{ inputs.environment }}
                  path: /tmp/tf-plans/

            - name: Terraform Apply
              env:
                  ENV: ${{ inputs.environment }}
                  TERRAFORM_STATE_BUCKET: ${{ secrets.TERRAFORM_STATE_BUCKET }}
                  TERRAFORM_LOCK_TABLE: ${{ secrets.TERRAFORM_LOCK_TABLE }}
              run: |
                  chmod +x scripts/terraform-apply.sh
                  make tf-apply

    docker-build:
        name: Docker Build - ${{ inputs.environment }}
        runs-on: ubuntu-latest
        if: needs.validate.outputs.proceed == 'true' && !inputs.terraform-only
        needs: [validate]
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Get AWS Account ID
              id: account
              run: |
                  ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

            - name: Docker Build & Push
              env:
                  ENV: ${{ inputs.environment }}
                  IMAGE_TAG: ${{ inputs.image-tag }}
                  AWS_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
              run: |
                  chmod +x scripts/docker-build.sh
                  make docker-push

    ecs-deploy:
        name: ECS Deploy - ${{ inputs.environment }}
        runs-on: ubuntu-latest
        if: needs.validate.outputs.proceed == 'true' && !inputs.terraform-only
        needs: [validate, approval, terraform-apply, docker-build]
        environment:
            name: ${{ inputs.environment }}
        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Get AWS Account ID
              id: account
              run: |
                  ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

            - name: ECS Deploy
              env:
                  ENV: ${{ inputs.environment }}
                  IMAGE_TAG: ${{ inputs.image-tag }}
                  AWS_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
              run: |
                  chmod +x scripts/ecs-deploy.sh
                  make ecs-deploy

    post-deployment:
        name: Post-Deployment - ${{ inputs.environment }}
        runs-on: ubuntu-latest
        if: success()
        needs: [validate, ecs-deploy]
        steps:
            - uses: actions/checkout@v4

            - name: Deployment Summary
              run: |
                  echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Attribute | Value |" >> $GITHUB_STEP_SUMMARY
                  echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
                  echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| Image Tag | ${{ inputs.image-tag }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| Deployed by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| Timestamp | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

    notify-failure:
        name: Notify Failure
        runs-on: ubuntu-latest
        if: failure()
        needs:
            [
                validate,
                terraform-plan,
                terraform-apply,
                docker-build,
                ecs-deploy,
            ]
        steps:
            - name: Deployment Failed
              run: |
                  echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
                  echo "Environment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
                  echo "Image Tag: ${{ inputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
                  exit 1
