###############################################################################
# CD — Staging Deployment
###############################################################################
# Responsibilities:
#   - Build + push backend + frontend images to GHCR (Trivy scan, warn-only)
#   - Terraform apply for staging environment
#   - ECS rolling deploy (force-new-deployment, always pulls the 'staging' tag)
#   - Smoke test after deployment
#
# Triggers:
#   - workflow_run: CI succeeds on develop
#   - workflow_dispatch (manual re-deploy)
#
# ALL secrets come from the GitHub Environment "staging".
# Non-secret config is loaded from config/.env.staging.
###############################################################################
name: CD — Staging

on:
  workflow_run:
    workflows: ["CI"]
    branches: [develop]
    types: [completed]
  workflow_dispatch:
    inputs:
      force-deploy:
        description: "Force deploy even if no code changes"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment: staging
    strategy:
      matrix:
        service: [backend, frontend]
      fail-fast: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Load staging environment
        run: grep -v '^\s*#' config/.env.staging | grep -v '^\s*$' >> "$GITHUB_ENV"

      - name: Authenticate with AWS
        uses: ./.github/actions/aws-auth
        with:
          role-arn: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, push & scan
        uses: ./.github/actions/docker-build
        with:
          context: ./${{ matrix.service }}
          dockerfile: ./${{ matrix.service }}/Dockerfile
          image-name: mypythonproject1/${{ matrix.service }}
          registry: ${{ steps.ecr-login.outputs.registry }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-,format=short
          build-args: |
            BUILD_ENV=staging
            GIT_SHA=${{ github.event.workflow_run.head_sha || github.sha }}
          platforms: linux/amd64
          scan: "true"
          scan-severity: "CRITICAL,HIGH"
          scan-exit-code: "0"
          cache-scope: ${{ matrix.service }}-staging

  terraform-staging:
    name: Terraform Apply (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Load staging environment
        run: grep -v '^\s*#' config/.env.staging | grep -v '^\s*$' >> "$GITHUB_ENV"

      - name: Authenticate with AWS
        uses: ./.github/actions/aws-auth
        with:
          role-arn: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Terraform runtime vars
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "TF_VAR_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mypythonproject1/backend" >> "$GITHUB_ENV"
          echo "TF_VAR_frontend_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mypythonproject1/frontend" >> "$GITHUB_ENV"
          echo "TF_VAR_jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Terraform apply
        uses: ./.github/actions/terraform/apply
        with:
          working-directory: ./infra
          terraform-version: ${{ env.TF_VERSION }}
          environment: staging
          aws-region: ${{ env.AWS_REGION }}
          state-bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}
          state-lock-table: ${{ secrets.TERRAFORM_LOCK_TABLE }}

  deploy-staging:
    name: Deploy to Staging (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [terraform-staging]
    environment: staging
    strategy:
      matrix:
        service: [backend, frontend]
      fail-fast: false
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Load staging environment
        run: grep -v '^\s*#' config/.env.staging | grep -v '^\s*$' >> "$GITHUB_ENV"

      - name: Authenticate with AWS
        uses: ./.github/actions/aws-auth
        with:
          role-arn: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          PROJECT_NAME=$(awk -F'=' '/^project_name[[:space:]]*=/{gsub(/["[:space:]]/,"",$2); print $2; exit}' infra/envs/staging.tfvars)
          CLUSTER_NAME="${PROJECT_NAME}-cluster"
          if [[ "${{ matrix.service }}" == "backend" ]]; then
            SERVICE_NAME="${PROJECT_NAME}-service"
          else
            SERVICE_NAME="${PROJECT_NAME}-frontend-service"
          fi

          aws ecs update-service \
            --cluster "${CLUSTER_NAME}" \
            --service "${SERVICE_NAME}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

      - name: Wait for service stability
        timeout-minutes: 10
        run: |
          PROJECT_NAME=$(awk -F'=' '/^project_name[[:space:]]*=/{gsub(/["[:space:]]/,"",$2); print $2; exit}' infra/envs/staging.tfvars)
          CLUSTER_NAME="${PROJECT_NAME}-cluster"
          if [[ "${{ matrix.service }}" == "backend" ]]; then
            SERVICE_NAME="${PROJECT_NAME}-service"
          else
            SERVICE_NAME="${PROJECT_NAME}-frontend-service"
          fi

          aws ecs wait services-stable \
            --cluster "${CLUSTER_NAME}" \
            --services "${SERVICE_NAME}" \
            --region "${{ env.AWS_REGION }}"

  smoke-test:
    name: Smoke Test
    needs: [deploy-staging]
    uses: ./.github/workflows/_smoke-test.yml
    with:
      environment: staging
      app-url: ${{ vars.APP_URL }}
      warmup-seconds: 15
      deploy-sha: ${{ github.event.workflow_run.head_sha || github.sha }}
    secrets: inherit
