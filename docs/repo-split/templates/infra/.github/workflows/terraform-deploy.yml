name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, prod]

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with AWS
        uses: ./.github/actions/aws-auth
        with:
          role-arn: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Export Terraform runtime vars
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "TF_VAR_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/mypythonproject1/backend" >> "$GITHUB_ENV"
          echo "TF_VAR_frontend_ecr_repository_url=${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/mypythonproject1/frontend" >> "$GITHUB_ENV"
          echo "TF_VAR_jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" >> "$GITHUB_ENV"

      - name: Terraform validate
        uses: ./.github/actions/terraform/validate
        with:
          working-directory: .
          terraform-version: ${{ vars.TF_VERSION }}
          environment: ${{ github.event.inputs.environment }}
          aws-region: ${{ vars.AWS_REGION }}
          state-bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}
          state-lock-table: ${{ secrets.TERRAFORM_LOCK_TABLE }}

      - name: Terraform plan
        uses: ./.github/actions/terraform/plan
        with:
          working-directory: .
          terraform-version: ${{ vars.TF_VERSION }}
          environment: ${{ github.event.inputs.environment }}
          aws-region: ${{ vars.AWS_REGION }}
          state-bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}
          state-lock-table: ${{ secrets.TERRAFORM_LOCK_TABLE }}

      - name: Terraform apply
        uses: ./.github/actions/terraform/apply
        with:
          working-directory: .
          terraform-version: ${{ vars.TF_VERSION }}
          environment: ${{ github.event.inputs.environment }}
          aws-region: ${{ vars.AWS_REGION }}
          state-bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}
          state-lock-table: ${{ secrets.TERRAFORM_LOCK_TABLE }}
